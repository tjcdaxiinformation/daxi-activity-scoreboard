<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>大溪宗教教育季活動海報</title>
    <!-- 載入 Tailwind CSS -->

    <!-- 載入 React & Babel -->

        /* 增加淡入動畫 */
        .fade-in {
            animation: fadeIn 0.5s ease-in forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root">
        <div class="flex items-center justify-center h-screen text-slate-400 font-bold">
            海報讀取中...

                { id: 3, name: '聖經人物猜謎', icon: 'user', textColor: 'text-amber-500', desc: '傳奇信心的榜樣' },

                                    </div>

                            </div>

        root.render(<App />);

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 vs 3 默契對抗計分板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            background-color: #020617;
            font-family: 'Noto Sans TC', sans-serif;
            color: white;
            overflow: hidden;
        }

        .excel-cell {
            border: 1px solid #1e293b;
            transition: all 0.2s;
        }

        .excel-cell:focus-within {
            background-color: #0f172a;
            border-color: #3b82f6;
            box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .team-a-theme { border-left: 8px solid #ef4444; }
        .team-b-theme { border-left: 8px solid #3b82f6; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .score-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .score-btn:active {
            transform: scale(0.9);
        }

        @keyframes trophy-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .winner-glow {
            box-shadow: 0 0 100px rgba(234, 179, 8, 0.3);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f59e0b;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const STAGES = ['默契題 1', '默契題 2', '默契題 3'];
        
        const INITIAL_TEAMS = [
            { 
                id: 'A', 
                name: '紅隊 (A)', 
                members: ['學員 1', '學員 2', '學員 3'],
                scores: [0, 0, 0]
            },
            { 
                id: 'B', 
                name: '藍隊 (B)', 
                members: ['學員 4', '學員 5', '學員 6'],
                scores: [0, 0, 0]
            }
        ];

        function App() {
            const [teams, setTeams] = useState(INITIAL_TEAMS);
            const [isFinished, setIsFinished] = useState(false);

            const processedTeams = useMemo(() => {
                const data = teams.map(t => ({
                    ...t,
                    total: t.scores.reduce((a, b) => a + b, 0)
                }));
                return data;
            }, [teams]);

            const winner = useMemo(() => {
                if (processedTeams[0].total > processedTeams[1].total) return processedTeams[0];
                if (processedTeams[1].total > processedTeams[0].total) return processedTeams[1];
                return null; // 平手
            }, [processedTeams]);

            const updateScore = (teamId, stageIdx, value) => {
                setTeams(prev => prev.map(t => {
                    if (t.id === teamId) {
                        const newScores = [...t.scores];
                        newScores[stageIdx] = parseInt(value) || 0;
                        return { ...t, scores: newScores };
                    }
                    return t;
                }));
            };

            const addTacitScore = (teamId, stageIdx, points) => {
                setTeams(prev => prev.map(t => {
                    if (t.id === teamId) {
                        const newScores = [...t.scores];
                        newScores[stageIdx] = points;
                        return { ...t, scores: newScores };
                    }
                    return t;
                }));
            };

            const updateInfo = (teamId, field, value, memberIdx = null) => {
                setTeams(prev => prev.map(t => {
                    if (t.id === teamId) {
                        if (field === 'name') return { ...t, name: value };
                        if (field === 'member') {
                            const newMembers = [...t.members];
                            newMembers[memberIdx] = value;
                            return { ...t, members: newMembers };
                        }
                    }
                    return t;
                }));
            };

            return (
                <div className="h-screen w-screen flex flex-col p-6 gap-6 relative">
                    
                    {/* 完答宣告畫面 (Overlay) */}
                    {isFinished && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-12 bg-slate-950/90 backdrop-blur-xl transition-all duration-700">
                            {/* 紙花效果 */}
                            {[...Array(30)].map((_, i) => (
                                <div key={i} className="confetti" style={{
                                    left: `${Math.random() * 100}%`,
                                    animationDelay: `${Math.random() * 3}s`,
                                    backgroundColor: ['#f59e0b', '#3b82f6', '#ef4444', '#10b981'][Math.floor(Math.random() * 4)]
                                }}></div>
                            ))}

                            <div className="w-full max-w-6xl aspect-[16/9] bg-gradient-to-br from-slate-900 to-slate-800 rounded-[4rem] border-4 border-yellow-500/50 shadow-[0_0_150px_rgba(234,179,8,0.2)] flex flex-col items-center justify-center p-16 text-center winner-glow relative overflow-hidden">
                                
                                <button 
                                    onClick={() => setIsFinished(false)}
                                    className="absolute top-10 right-10 text-slate-500 hover:text-white text-2xl font-black"
                                >
                                    ✕ CLOSE
                                </button>

                                <div className="space-y-8 z-10">
                                    <div className="animate-[trophy-bounce_2s_infinite]">
                                        <svg className="w-48 h-48 text-yellow-500 mx-auto drop-shadow-[0_0_30px_rgba(234,179,8,0.5)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                                        </svg>
                                    </div>

                                    <h2 className="text-4xl font-black text-yellow-500 tracking-[1em] uppercase opacity-80">Final Winner</h2>
                                    
                                    {winner ? (
                                        <>
                                            <h3 className="text-9xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500 drop-shadow-2xl">
                                                {winner.name}
                                            </h3>
                                            <div className="pt-6">
                                                <span className="text-2xl font-bold text-slate-500 uppercase tracking-widest mr-4">Total Score</span>
                                                <span className="text-8xl font-black text-white tabular-nums">{winner.total}</span>
                                            </div>
                                        </>
                                    ) : (
                                        <h3 className="text-9xl font-black italic text-white">DRAW GAME!</h3>
                                    )}

                                    <div className="pt-12 flex gap-4 justify-center">
                                        {winner?.members.map((m, i) => (
                                            <span key={i} className="px-8 py-3 bg-white/5 border border-white/10 rounded-2xl text-xl font-bold text-slate-300">
                                                {m}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                {/* 背景裝飾大字 */}
                                <div className="absolute inset-0 flex items-center justify-center opacity-[0.03] select-none pointer-events-none">
                                    <span className="text-[40rem] font-black italic">WINNER</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <div className="flex justify-between items-center px-4 shrink-0">
                        <div className="space-y-1">
                            <h1 className="text-5xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-blue-500">
                                3 VS 3 TACIT BATTLE
                            </h1>
                            <p className="text-slate-500 font-mono text-sm tracking-[0.3em]">CELL GROUP CONFRONTATION MODE</p>
                        </div>
                        <div className="flex items-center gap-6">
                            <button 
                                onClick={() => setIsFinished(true)}
                                className="px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-950 rounded-2xl font-black text-xl shadow-[0_10px_30px_rgba(234,179,8,0.3)] transition-all active:scale-95 flex items-center gap-3"
                            >
                                <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                                完答並結算
                            </button>
                            <div className="text-center">
                                <div className="text-slate-500 text-xs font-bold uppercase mb-1">對抗狀態</div>
                                <div className="flex items-center gap-2 text-yellow-500 font-black text-xl italic">
                                    <span className="w-3 h-3 bg-yellow-500 rounded-full animate-ping"></span>
                                    BATTLE LIVE
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Scoreboard Area */}
                    <div className="flex-1 grid grid-cols-2 gap-8 overflow-hidden">
                        {processedTeams.map((team) => (
                            <div key={team.id} className={`flex flex-col bg-slate-900/40 rounded-[2rem] border border-slate-800 overflow-hidden ${team.id === 'A' ? 'team-a-theme' : 'team-b-theme'}`}>
                                {/* Team Header */}
                                <div className="p-8 bg-slate-900/60 border-b border-slate-800 flex justify-between items-center">
                                    <div className="space-y-4 flex-1">
                                        <input 
                                            type="text" 
                                            value={team.name}
                                            onChange={(e) => updateInfo(team.id, 'name', e.target.value)}
                                            className="bg-transparent text-5xl font-black outline-none w-full border-b-2 border-dashed border-slate-700 focus:border-white transition-colors"
                                        />
                                        <div className="flex gap-4">
                                            {team.members.map((m, mIdx) => (
                                                <input 
                                                    key={mIdx}
                                                    type="text" 
                                                    value={m}
                                                    onChange={(e) => updateInfo(team.id, 'member', e.target.value, mIdx)}
                                                    className="bg-slate-800 px-3 py-1 rounded-lg text-sm font-bold text-slate-400 outline-none focus:text-white w-24"
                                                />
                                            ))}
                                        </div>
                                    </div>
                                    <div className="text-right pl-8">
                                        <div className="text-slate-500 text-xs font-black uppercase tracking-widest mb-1">Group Total</div>
                                        <div className={`text-9xl font-black italic tracking-tighter ${team.id === 'A' ? 'text-red-500' : 'text-blue-500'}`}>
                                            {team.total}
                                        </div>
                                    </div>
                                </div>

                                {/* Scoring Grid */}
                                <div className="flex-1 p-8 overflow-y-auto custom-scrollbar">
                                    <table className="w-full">
                                        <thead>
                                            <tr className="text-slate-500 text-xs font-black uppercase tracking-widest text-left">
                                                <th className="pb-4">挑戰項目</th>
                                                <th className="pb-4 text-center">手動輸入</th>
                                                <th className="pb-4 text-right">默契給分 (2/3 或 3/3)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="space-y-4">
                                            {STAGES.map((s, sIdx) => (
                                                <tr key={sIdx} className="group">
                                                    <td className="py-3 text-xl font-bold text-slate-300">{s}</td>
                                                    <td className="py-3 px-4">
                                                        <div className="excel-cell rounded-xl overflow-hidden bg-slate-950/50">
                                                            <input 
                                                                type="number" 
                                                                value={team.scores[sIdx] || ''}
                                                                placeholder="0"
                                                                onChange={(e) => updateScore(team.id, sIdx, e.target.value)}
                                                                className="w-full h-full bg-transparent p-3 text-2xl font-black text-center outline-none text-white focus:text-blue-400"
                                                            />
                                                        </div>
                                                    </td>
                                                    <td className="py-3 text-right space-x-2">
                                                        <button 
                                                            onClick={() => addTacitScore(team.id, sIdx, 50)}
                                                            className={`score-btn px-4 py-2 rounded-xl text-sm font-black border-2 ${team.scores[sIdx] === 50 ? 'bg-yellow-500 border-yellow-500 text-slate-950 shadow-[0_0_15px_rgba(234,179,8,0.4)]' : 'border-slate-800 text-slate-500 hover:border-yellow-500/50 hover:text-yellow-500'}`}
                                                        >
                                                            及格 +50
                                                        </button>
                                                        <button 
                                                            onClick={() => addTacitScore(team.id, sIdx, 150)}
                                                            className={`score-btn px-4 py-2 rounded-xl text-sm font-black border-2 ${team.scores[sIdx] === 150 ? 'bg-green-500 border-green-500 text-slate-950 shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'border-slate-800 text-slate-500 hover:border-green-500/50 hover:text-green-500'}`}
                                                        >
                                                            完勝 +150
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Rules Footer Overlay */}
                    <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex justify-between items-center shrink-0">
                        <div className="flex gap-10">
                            <div className="flex items-center gap-3">
                                <span className="px-3 py-1 bg-yellow-500/10 text-yellow-500 border border-yellow-500/30 rounded font-black">及格 50分</span>
                                <span className="text-slate-400 text-sm font-bold">2/3 答案一致 (66% 默契)</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="px-3 py-1 bg-green-500/10 text-green-500 border border-green-500/30 rounded font-black">完勝 150分</span>
                                <span className="text-slate-400 text-sm font-bold">3/3 全員一致 (100% 完勝)</span>
                            </div>
                        </div>
                        <div className="text-slate-600 font-mono text-xs italic">
                            PROJECTION READY • {new Date().toLocaleTimeString()}
                        </div>
                    </div>

                    <style dangerouslySetInnerHTML={{ __html: `
                        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
